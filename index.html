<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Blocky Bear Story Hunt</title>
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<style>
:root{
  --gold:#ffd75d;--gold-dk:#c8920a;--brown:#5a2d0c;
  --cream:#fffbef;--text-warm:#3a1e08;
  --glass:rgba(255,248,220,0.94);--sh:rgba(50,20,0,0.30);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Georgia','Times New Roman',serif;touch-action:manipulation;}

/* ══════════════════════════════════════
   SCENE BACKGROUND — each chapter uses
   a rich SVG illustration as bg-image
══════════════════════════════════════ */
#scene{
  position:fixed;inset:0;z-index:0;
  background-size:cover;
  background-position:center bottom;
  background-repeat:no-repeat;
  transition:background-image 0.4s ease;
}
    #scene[data-s="0"]{background-image:url("assets/images/chapter1-entry-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}
    #scene[data-s="1"]{background-image:url("assets/images/chapter2-eatery-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}
    #scene[data-s="2"]{background-image:url("assets/images/chapter3-pavilion-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}
    #scene[data-s="3"]{background-image:url("assets/images/chapter4-grass-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}
    #scene[data-s="4"]{background-image:url("assets/images/chapter5-office-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}
    #scene[data-s="5"]{background-image:url("assets/images/chapter6-stage-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}
    #scene[data-s="6"]{background-image:url("assets/images/chapter7-behindstage-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}
    #scene[data-s="7"]{background-image:url("assets/images/chapter8-books-bg.png");background-size:cover;background-position:center bottom;background-repeat:no-repeat;}

/* ══════════════════════════════════════
   ARCH OVERLAY — Chapter 1 entrance arch
══════════════════════════════════════ */
#arch-overlay{
  position:fixed;inset:0;z-index:3;
  pointer-events:none;display:none;
  justify-content:center;padding-top:28%;
}
#arch-overlay.show{display:flex;}

/* ══════════════════════════════════════
   DEPTH LAYERS — foreground / midground
   z: 1–4, between scene (0) and bear (10)
══════════════════════════════════════ */

/* Foreground trees — left and right, soft blurred organic shapes */
.depth-tree{
  position:fixed;bottom:-40px;
  width:220px;height:260px;
  background:radial-gradient(ellipse at center,#2f8f5a 0%,#1f6f44 70%);
  border-radius:50%;
  filter:blur(2px);
  opacity:0.85;
  z-index:2;
  pointer-events:none;
}
.depth-tree.left { left:-60px; }
.depth-tree.right{ right:-60px; }

/* Midground path / clearing — warm elliptical glow under the bear */
#depth-path{
  position:fixed;bottom:120px;left:50%;
  transform:translateX(-50%);
  width:320px;height:140px;
  background:radial-gradient(ellipse at center,
    rgba(255,235,180,0.60) 0%,
    rgba(255,235,180,0.25) 40%,
    transparent 75%);
  filter:blur(10px);
  z-index:2;
  pointer-events:none;
}

/* Center glow — soft halo centered slightly above bear, pulls the eye */
#depth-center-glow{
  position:fixed;
  left:50%;top:35%;
  transform:translate(-50%,-50%);
  width:380px;height:380px;
  background:radial-gradient(circle,
    rgba(255,246,199,0.38) 0%,
    rgba(231,242,198,0.22) 35%,
    transparent 70%);
  filter:blur(18px);
  z-index:1;
  pointer-events:none;
}

/* Subtle floating light glow — upper left accent */
#depth-light-glow{
  position:fixed;
  width:200px;height:200px;
  top:20%;left:20%;
  background:radial-gradient(circle,
    rgba(255,255,200,0.20) 0%,
    transparent 70%);
  filter:blur(20px);
  z-index:1;
  pointer-events:none;
}

/* Vignette — darkens corners, frames the scene */
#depth-vignette{
  position:fixed;inset:0;z-index:4;
  background:radial-gradient(circle at center,
    transparent 55%,
    rgba(0,0,0,0.18) 100%);
  pointer-events:none;
}

/* ══════════════════════════════════════
   BEAR OVERLAY
══════════════════════════════════════ */
#bear-overlay{
  position:fixed;inset:0;z-index:10;
  pointer-events:none;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  /* Bear feet land on the stone path in the clearing */
  padding-bottom:clamp(92px,16vh,120px);
}
#bear-scene{
  position:relative;
  /* Prominent size — bear is the hero of this entrance scene */
  width:min(310px,76vw);
  opacity:0;transform:scale(0.5) translateY(30px);
  transition:opacity .55s cubic-bezier(.34,1.56,.64,1),
             transform .55s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
#bear-scene.visible{opacity:1;transform:scale(1) translateY(0);}

#bear-ground-shadow{
  position:absolute;bottom:-10px;left:50%;
  transform:translateX(-50%);
  /* Wider, more blurred — reads as natural cast shadow on ground */
  width:110%;height:40px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.45) 0%,rgba(0,0,0,0.18) 45%,transparent 72%);
  border-radius:50%;z-index:0;
  filter:blur(6px);
}
#bear-scene.happy  #bear-ground-shadow{animation:shSq 1.1s cubic-bezier(.34,1.56,.64,1);}
#bear-scene.talking #bear-ground-shadow{animation:shTk .46s ease-in-out infinite;}
@keyframes shSq{0%{transform:translateX(-50%) scaleX(1);opacity:1;}14%{transform:translateX(-50%) scaleX(1.22);opacity:.80;}40%{transform:translateX(-50%) scaleX(.62);opacity:.48;}60%{transform:translateX(-50%) scaleX(.62);opacity:.48;}78%{transform:translateX(-50%) scaleX(1.16);opacity:.88;}100%{transform:translateX(-50%) scaleX(1);opacity:1;}}
@keyframes shTk{0%,100%{transform:translateX(-50%) scaleX(1);opacity:1;}32%{transform:translateX(-50%) scaleX(.85);opacity:.75;}}

#bear-img-wrap{
  position:relative;z-index:1;width:100%;
  /* isolation scopes mix-blend-mode to this container only */
  isolation:isolate;
  /* drop-shadow traces the bear's actual shape (works with transparent PNG),
     warm tone makes it feel lit from the scene rather than pasted on */
  filter:drop-shadow(0 25px 35px rgba(0,0,0,0.45))
         drop-shadow(0 0 40px rgba(255,220,160,0.22))
         drop-shadow(0 8px 16px rgba(0,0,0,0.30));
}
/* Warm scene light behind bear — soft radial pool */
#bear-img-wrap::before{
  content:"";position:absolute;
  bottom:-5%;left:5%;right:5%;top:20%;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 75%,rgba(255,210,120,0.32) 0%,transparent 65%);
  z-index:0;pointer-events:none;
}
#bear-img{
  position:relative;z-index:1;
  width:100%;height:auto;display:block;
  transform-origin:50% 92%;
  user-select:none;-webkit-user-drag:none;will-change:transform;
  /* multiply: white pixels (255,255,255) × scene = scene color → white disappears.
     Bear's brown fur (dark values) × scene ≈ original dark tone → fur stays visible. */
  mix-blend-mode:multiply;
}
#bear-blink-overlay{
  position:absolute;top:14%;left:18%;
  width:64%;height:18%;
  pointer-events:none;z-index:2;
  opacity:0;transform:scaleY(0.04);transform-origin:center top;
}
#bear-blink-overlay svg{width:100%;height:100%;overflow:visible;}

/* Speech bubble */
#speech-bubble{
  position:absolute;bottom:calc(100% + 12px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--glass);border:3px solid rgba(255,255,255,0.96);
  border-radius:26px;padding:12px 20px;
  font-size:clamp(14px,4vw,18px);font-weight:bold;color:var(--text-warm);
  text-align:center;white-space:nowrap;max-width:min(310px,88vw);
  box-shadow:0 6px 24px var(--sh),inset 0 2px 4px rgba(255,240,200,0.5);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  opacity:0;transition:opacity .35s ease,transform .35s ease;
  pointer-events:none;z-index:12;
}
#speech-bubble.visible{opacity:1;transform:translateX(-50%) translateY(0);}
#speech-bubble::after{content:"";position:absolute;left:52px;bottom:-14px;width:16px;height:16px;background:var(--glass);border-right:3px solid rgba(255,255,255,0.96);border-bottom:3px solid rgba(255,255,255,0.96);transform:rotate(45deg);}

/* Bear animations */
#bear-scene.entering #bear-img{animation:beEnter .7s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes beEnter{0%{transform:scale(.68) translateY(28px);}72%{transform:scale(1.06) translateY(-7px);}100%{transform:scale(1) translateY(0);}}
#bear-scene.idle #bear-img{animation:beBreathe 4.8s ease-in-out infinite;}
@keyframes beBreathe{0%,100%{transform:scaleX(1) scaleY(1) translateY(0);}48%{transform:scaleX(1.016) scaleY(1.034) translateY(-5px);}}
#bear-scene.idle{animation:beSway 7.4s ease-in-out infinite;}
@keyframes beSway{0%,100%{transform:translateX(0) rotateZ(0);}28%{transform:translateX(5px) rotateZ(.9deg);}72%{transform:translateX(-5px) rotateZ(-.9deg);}}
#bear-scene.talking #bear-img{animation:beTalk .46s ease-in-out infinite;}
@keyframes beTalk{0%{transform:translateY(0) scaleY(1);}32%{transform:translateY(-6px) scaleY(1.018);}62%{transform:translateY(-2px) scaleY(1.008);}100%{transform:translateY(0) scaleY(1);}}
#bear-scene.happy #bear-img{animation:beHappy 1.1s cubic-bezier(.34,1.56,.64,1);}
@keyframes beHappy{0%{transform:scaleX(1) scaleY(1) translateY(0) rotate(0);}12%{transform:scaleX(1.12) scaleY(.82) translateY(0) rotate(-1.5deg);}38%{transform:scaleX(.87) scaleY(1.25) translateY(-36px) rotate(2deg);}58%{transform:scaleX(.87) scaleY(1.25) translateY(-36px) rotate(-1.5deg);}76%{transform:scaleX(1.08) scaleY(.9) translateY(0) rotate(.8deg);}100%{transform:scaleX(1) scaleY(1) translateY(0) rotate(0);}}
#bear-scene.twitch #bear-img{animation:beTwitch .55s ease;}
@keyframes beTwitch{0%,100%{transform:scale(1);}40%{transform:scaleX(1.03) scaleY(.975) translateY(-3px);}}
#bear-scene.blinking #bear-blink-overlay{animation:beBlinkLid .30s ease forwards;}
@keyframes beBlinkLid{0%,100%{opacity:0;transform:scaleY(.04);}35%,65%{opacity:.96;transform:scaleY(1);}}

/* ══════════════════════════════════════
   TOP HUD — warm storybook parchment style
   Matches the opening screen header pill
══════════════════════════════════════ */
#top-hud{
  position:fixed;top:env(safe-area-inset-top,10px);
  left:0;right:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:10px 16px 0;pointer-events:none;
}
#title-pill{
  background:rgba(255,245,210,0.82);
  border:2px solid rgba(255,255,255,0.78);
  border-radius:999px;padding:7px 22px;
  font-size:clamp(13px,3.5vw,15px);font-weight:bold;color:#5a2d0c;
  letter-spacing:.02em;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 4px 18px rgba(0,0,0,0.22);
}

/* ══════════════════════════════════════
   PROGRESS TRACKER — golden book tabs
══════════════════════════════════════ */
#progress-row{
  display:flex;gap:4px;padding:5px 10px;
  background:rgba(10,5,0,0.38);
  border-radius:999px;
  border:1.5px solid rgba(200,160,40,0.32);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 3px 12px rgba(0,0,0,0.28);
}
.pg-dot{
  width:20px;height:24px;
  border-radius:4px 4px 4px 4px;
  background:linear-gradient(180deg,rgba(255,255,255,0.16),rgba(255,255,255,0.06));
  border:1.5px solid rgba(200,160,40,0.28);
  position:relative;overflow:hidden;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
}
.pg-dot::before{
  content:"";position:absolute;left:3px;right:3px;top:7px;
  height:2px;border-radius:1px;
  background:rgba(200,160,40,0.18);
  box-shadow:0 4px 0 rgba(200,160,40,0.12);
}
.pg-dot::after{
  content:"";position:absolute;top:0;right:0;width:5px;height:5px;
  background:rgba(200,160,40,0.16);
  clip-path:polygon(100% 0,0 0,100% 100%);
}
.pg-dot.found{
  background:linear-gradient(145deg,#ffe57a,#ffce00,#ffb000);
  border-color:var(--gold-dk);
  box-shadow:0 0 10px rgba(255,210,60,0.60),0 2px 5px rgba(0,0,0,0.25);
  transform:scale(1.22) translateY(-2px);
}
.pg-dot.found::before{background:rgba(100,50,0,0.22);box-shadow:0 4px 0 rgba(100,50,0,0.14);}
.pg-dot.found::after{background:rgba(180,120,0,0.32);}
.pg-dot.pop{animation:dotPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes dotPop{0%{transform:scale(1.22) translateY(-2px);}40%{transform:scale(1.65) translateY(-6px) rotate(12deg);}100%{transform:scale(1.22) translateY(-2px);}}

/* ══════════════════════════════════════
   SPEECH BUBBLE — warm cream card
   Styled to match the reference card feel
   rather than the old floating bubble
══════════════════════════════════════ */
#speech-bubble{
  position:absolute;bottom:calc(100% + 14px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:rgba(255,245,215,0.88);
  border:2px solid rgba(255,255,255,0.82);
  border-radius:20px;padding:11px 18px;
  font-size:clamp(14px,3.8vw,17px);font-weight:bold;color:#3e1604;
  text-align:center;white-space:nowrap;max-width:min(290px,84vw);
  box-shadow:0 8px 24px rgba(0,0,0,0.22),inset 0 2px 4px rgba(255,240,200,0.5);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  opacity:0;transition:opacity .35s ease,transform .35s ease;
  pointer-events:none;z-index:12;
}
#speech-bubble.visible{opacity:1;transform:translateX(-50%) translateY(0);}
#speech-bubble::after{
  content:"";position:absolute;left:50%;transform:translateX(-50%) rotate(45deg);
  bottom:-9px;width:14px;height:14px;
  background:rgba(255,245,215,0.88);
  border-right:2px solid rgba(255,255,255,0.82);
  border-bottom:2px solid rgba(255,255,255,0.82);
}

/* ══════════════════════════════════════
   CHAPTER SIGN — warm cream plaque
   Matches the storybook warmth of the
   reference rather than dark green
══════════════════════════════════════ */
#chapter-label{
  position:fixed;bottom:env(safe-area-inset-bottom,16px);
  left:50%;transform:translateX(-50%);
  z-index:30;pointer-events:none;
  opacity:1;transition:opacity .4s ease;white-space:nowrap;
}
#chapter-label.hidden{opacity:0;}
#chapter-pill{
  background:rgba(255,245,210,0.88);
  border:2.5px solid rgba(255,255,255,0.82);
  border-radius:999px;padding:10px 30px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  box-shadow:0 8px 26px rgba(0,0,0,0.28),0 2px 6px rgba(0,0,0,0.18),inset 0 2px 4px rgba(255,240,190,0.5);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#chapter-num{
  font-size:10px;font-weight:900;letter-spacing:.20em;
  text-transform:uppercase;color:#8b5e1a;
}
#chapter-title-text{
  font-size:clamp(17px,4.8vw,22px);font-weight:bold;
  color:#3e1604;
  text-shadow:0 1px 3px rgba(255,210,100,0.25);
  letter-spacing:.02em;
}

/* Tap-to-play */
#tap-play{
  position:fixed;bottom:env(safe-area-inset-bottom,24px);left:50%;transform:translateX(-50%);
  z-index:35;display:none;
  background:linear-gradient(180deg,#ffd84d 0%,#f4b400 100%);
  border:none;border-radius:999px;padding:14px 40px;
  font-size:clamp(16px,4.5vw,19px);font-weight:900;
  color:#3a1e00;cursor:pointer;font-family:inherit;
  box-shadow:0 8px 24px rgba(0,0,0,0.18),0 3px 8px rgba(0,0,0,0.14);
  animation:btnPulse 2.2s ease-in-out infinite;
}
#tap-play.show{display:block;}
@keyframes btnPulse{0%,100%{box-shadow:0 8px 24px rgba(0,0,0,0.18),0 3px 8px rgba(0,0,0,0.14);}50%{box-shadow:0 10px 36px rgba(200,140,0,0.45),0 3px 10px rgba(0,0,0,0.16);}}

/* Effects */
#effects-layer{position:fixed;inset:0;z-index:20;pointer-events:none;overflow:hidden;}
.fx-piece{position:absolute;opacity:0;pointer-events:none;will-change:transform,opacity;font-size:clamp(18px,5vw,24px);line-height:1;}
.fx-dot  {position:absolute;opacity:0;pointer-events:none;border-radius:50%;will-change:transform,opacity;}
@keyframes fxRise{0%{opacity:0;transform:translate(0,0) scale(.5) rotate(var(--rot-start));}15%{opacity:1;}70%{opacity:.8;}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.05) rotate(var(--rot));}}
@keyframes fxFinalBurst{0%{opacity:0;transform:translate(0,0) scale(.4);}8%{opacity:1;}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(1.1) rotate(var(--rot));}}

/* Final glow + banner */
#final-glow{position:fixed;left:50%;top:60%;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,rgba(255,240,100,.95) 0%,rgba(255,220,60,.2) 45%,transparent 70%);transform:translate(-50%,-50%) scale(0);opacity:0;z-index:65;pointer-events:none;}
#final-glow.show{animation:glowExp 2.2s ease-out 3;}
@keyframes glowExp{0%{transform:translate(-50%,-50%) scale(.15);opacity:0;}16%{opacity:1;}100%{transform:translate(-50%,-50%) scale(18);opacity:0;}}
#rainbow-banner{position:fixed;top:12%;left:50%;transform:translateX(-50%) translateY(-70px);min-width:270px;max-width:90vw;padding:16px 22px;border-radius:24px;border:3px solid #fff;color:var(--text-warm);font-size:clamp(19px,5.2vw,26px);font-weight:900;text-align:center;background:linear-gradient(90deg,#ffb6d9,#ffd97a,#baf0ad,#9fdfff,#ffb6d9);box-shadow:0 12px 32px rgba(0,0,0,.22);opacity:0;z-index:70;pointer-events:none;font-family:inherit;}
#rainbow-banner.show{animation:bannerDrop 5.5s ease forwards;}
@keyframes bannerDrop{0%{opacity:0;transform:translateX(-50%) translateY(-70px);}10%{opacity:1;transform:translateX(-50%) translateY(0);}85%{opacity:1;}100%{opacity:0;transform:translateX(-50%) translateY(-18px);}}

/* Final card */
#final-screen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(10,5,0,.58);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:60;}
#final-screen.show{display:flex;}
#final-card{width:min(90vw,490px);background:linear-gradient(160deg,#fffdf0,#fff8e0);border:4px solid rgba(255,255,255,.96);border-radius:32px;box-shadow:0 30px 65px rgba(0,0,0,.35);padding:28px 22px 22px;text-align:center;}
.fc-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:800;color:#b07830;}
.fc-title  {margin-top:8px;font-size:clamp(34px,9vw,46px);line-height:.95;font-weight:900;color:var(--brown);}
.fc-body   {margin-top:14px;font-size:clamp(15px,4.2vw,18px);line-height:1.55;color:#4a3a1a;}
.fc-icons  {margin-top:14px;font-size:30px;letter-spacing:8px;}
.fc-btns   {display:flex;gap:10px;margin-top:20px;}
.fc-btn    {border:none;border-radius:18px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;flex:1;font-family:inherit;}
.fc-btn.primary{background:var(--gold);color:var(--text-warm);}
.fc-btn.ghost  {background:#fff;color:var(--text-warm);border:2px solid #ddd;}

/* ══════════════════════════════════════════════════════
   START SCREEN — Full-screen illustrated forest scene
   Primary: assets/forest_bg.png
   Fallback: layered CSS forest if image not found
══════════════════════════════════════════════════════ */
#start-screen{
  position:fixed;inset:0;z-index:90;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  overflow:hidden;
  padding:0;
  /* Paint the background directly on #start-screen so nothing bleeds through */
  background:
    url('assets/forest_bg.png') center center / cover no-repeat,
    radial-gradient(ellipse 55% 65% at 50% -5%, #fffbe0 0%, #f0f0a0 15%, transparent 55%),
    radial-gradient(ellipse 100% 60% at 50% 0%,  #c8e890 0%, transparent 50%),
    linear-gradient(180deg,
      #c4e87a 0%,#9fd45c 18%,#7ac244 32%,
      #5aaa2e 50%,#3e8a1a 68%,#2a6e0e 85%,#1e5808 100%
    );
}
#start-screen.hidden{display:none;}

/* #start-bg acts as an overlay for vignette/depth effects on top of the image */
#start-bg{
  position:absolute;inset:0;z-index:0;
  /* Vignette to darken edges slightly over the forest image */
  background:radial-gradient(ellipse 100% 100% at 50% 50%,
    transparent 42%, rgba(0,0,0,0.38) 100%);
  pointer-events:none;
}

/* ═══════════════════════════════════════════════════════
   CHAPTER SCENE ELEMENTS — hidden until game is started.
   body.started is added by JS when the start button fires.
   This guarantees the opening screen is always clean.
═══════════════════════════════════════════════════════ */
body:not(.started) #scene,
body:not(.started) #bear-overlay,
body:not(.started) #top-hud,
body:not(.started) #chapter-label,
body:not(.started) #tap-play,
body:not(.started) #effects-layer,
body:not(.started) #arch-overlay,
body:not(.started) .depth-tree,
body:not(.started) #depth-path,
body:not(.started) #depth-center-glow,
body:not(.started) #depth-light-glow,
body:not(.started) #depth-vignette,
body:not(.started) #final-glow,
body:not(.started) #rainbow-banner {
  display: none !important;
}

/* ── Content layout ── */
#start-content{
  position:relative;z-index:2;
  width:100%;max-width:420px;
  display:flex;flex-direction:column;
  align-items:center;
  padding:env(safe-area-inset-top,12px) 20px 0;
  height:100%;
  justify-content:space-between;
  padding-bottom:env(safe-area-inset-bottom,24px);
  gap:0;
}

/* ── Header pill ── */
#start-header-pill{
  background:rgba(255,245,210,0.82);
  border:2px solid rgba(255,255,255,0.78);
  border-radius:999px;
  padding:7px 22px;
  font-size:clamp(13px,3.5vw,15px);
  font-weight:bold;
  color:#5a2d0c;
  letter-spacing:0.02em;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  box-shadow:0 4px 18px rgba(0,0,0,0.22);
  margin-top:4px;
  flex-shrink:0;
}

/* ── Info card ── */
#start-card{
  background:rgba(255,245,220,0.72);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:2px solid rgba(255,255,255,0.72);
  border-radius:24px;
  padding:22px 26px 20px;
  width:min(320px,88vw);
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.18),inset 0 2px 4px rgba(255,245,200,0.5);
  flex-shrink:0;
}
#start-title{
  font-size:clamp(26px,7.5vw,36px);
  font-weight:900;
  color:#3e1604;
  line-height:1.08;
  text-shadow:0 1px 3px rgba(255,210,100,0.25);
  margin:0 0 10px;
}
#start-chapter-info{
  font-size:clamp(13px,3.8vw,16px);font-weight:bold;color:#5a2d0c;
  text-align:center;line-height:1.45;
  background:rgba(100,50,0,.10);border-radius:14px;
  border:1.5px solid rgba(180,120,40,.28);
  padding:8px 18px;display:none;margin-bottom:6px;
}
#start-subtitle{
  font-size:clamp(14px,3.8vw,17px);
  color:#5a3010;
  font-weight:600;
  line-height:1.5;
  margin:0;
}

/* ── Bear zone ── */
#start-bear-wrap{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding:8px 0 0;
}
#start-bear-preview{
  width:min(220px,58vw);
  max-height:40vh;
  object-fit:contain;
  display:block;
  margin:0 auto;
  filter:drop-shadow(0 25px 35px rgba(0,0,0,0.28))
         drop-shadow(0 6px 14px rgba(0,0,0,0.22));
  animation:startFloat 3.6s ease-in-out infinite;
  mix-blend-mode:multiply;
  position:relative;
  z-index:5;
}
/* Ground shadow beneath bear feet */
#start-ground-shadow{
  width:180px;
  height:40px;
  margin:-8px auto 0;
  background:radial-gradient(ellipse at center, rgba(0,0,0,0.22), transparent 70%);
  filter:blur(8px);
  flex-shrink:0;
}
@keyframes startFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%    {transform:translateY(-10px) scale(1.015);}
}

/* ── CTA Button ── */
#start-btn-wrap{
  flex-shrink:0;
  padding-bottom:6px;
}
#start-btn{
  background:linear-gradient(180deg,#ffd84d 0%,#f4b400 100%);
  border:none;border-radius:999px;
  padding:17px 58px;
  font-size:clamp(19px,5.2vw,23px);font-weight:900;
  color:#3a1e00;cursor:pointer;font-family:inherit;
  box-shadow:0 12px 24px rgba(0,0,0,0.18),
             0 4px 10px rgba(0,0,0,0.14),
             inset 0 2px 5px rgba(255,255,180,0.40);
  letter-spacing:0.02em;
  animation:btnPulse 2.4s ease-in-out infinite;
  white-space:nowrap;
}
.bear-emoji-fallback{
  font-size:clamp(90px,24vw,120px);line-height:1;display:block;
  text-align:center;
  filter:drop-shadow(0 6px 18px rgba(0,0,0,.45));
  animation:startFloat 3.4s ease-in-out infinite;
}
/* ══════════════════════════════════════
   QR SCANNER — full-screen overlay
══════════════════════════════════════ */
#scan-btn{
  position:fixed;bottom:env(safe-area-inset-bottom,18px);right:18px;
  z-index:50;
  display:none; /* shown only after .started */
  width:56px;height:56px;
  background:linear-gradient(145deg,#ffe066,#ffd000,#ffb300);
  border:none;border-radius:50%;
  box-shadow:0 4px 18px rgba(0,0,0,0.32);
  cursor:pointer;font-size:24px;
  align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:transform .12s ease;
}
#scan-btn:active{transform:scale(0.90);}
body.started #scan-btn{display:flex;}

#scanner-overlay{
  position:fixed;inset:0;z-index:200;
  background:#000;
  display:none;flex-direction:column;
  align-items:center;justify-content:flex-start;
}
#scanner-overlay.open{display:flex;}

#scanner-video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}

#scanner-ui{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,24px);
  pointer-events:none;
}

#scanner-header{
  pointer-events:all;
  width:100%;display:flex;
  align-items:center;justify-content:space-between;
  padding:12px 18px;
  background:linear-gradient(rgba(0,0,0,0.55),transparent);
}
#scanner-title{
  font-size:17px;font-weight:bold;
  color:#fff;letter-spacing:.04em;
  font-family:'Georgia','Times New Roman',serif;
}
#scanner-close{
  background:rgba(255,255,255,0.18);
  border:1.5px solid rgba(255,255,255,0.5);
  border-radius:999px;padding:6px 18px;
  color:#fff;font-size:15px;font-weight:bold;
  cursor:pointer;font-family:inherit;
  -webkit-tap-highlight-color:transparent;
}

/* Targeting reticle */
#scanner-reticle{
  width:min(68vw,260px);height:min(68vw,260px);
  position:relative;pointer-events:none;
}
#scanner-reticle::before,
#scanner-reticle::after{
  content:"";position:absolute;inset:0;
  border:3px solid rgba(255,220,80,0.90);
  border-radius:16px;
}
#scanner-reticle::after{
  animation:reticlePulse 1.8s ease-in-out infinite;
  border-color:rgba(255,220,80,0.45);
}
@keyframes reticlePulse{
  0%,100%{transform:scale(1);opacity:1;}
  50%     {transform:scale(1.06);opacity:.55;}
}
/* Corner brackets */
#scanner-reticle span{
  position:absolute;width:22px;height:22px;
  border-color:rgba(255,220,80,1);border-style:solid;border-width:0;
}
#scanner-reticle span:nth-child(1){top:0;left:0;border-top-width:3px;border-left-width:3px;border-radius:8px 0 0 0;}
#scanner-reticle span:nth-child(2){top:0;right:0;border-top-width:3px;border-right-width:3px;border-radius:0 8px 0 0;}
#scanner-reticle span:nth-child(3){bottom:0;left:0;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 8px;}
#scanner-reticle span:nth-child(4){bottom:0;right:0;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 8px 0;}

#scanner-hint{
  color:rgba(255,255,255,0.82);font-size:14px;
  text-align:center;padding:0 24px 8px;
  font-family:'Georgia','Times New Roman',serif;
  text-shadow:0 1px 4px rgba(0,0,0,0.7);
  pointer-events:none;
}
#scanner-error{
  display:none;
  position:absolute;inset:0;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,0.82);padding:32px;
  text-align:center;
}
#scanner-error.show{display:flex;}
#scanner-error p{
  color:#fff;font-size:16px;line-height:1.6;
  font-family:'Georgia','Times New Roman',serif;
}

</head>
<body>

<!-- QR SCANNER OVERLAY -->
<div id="scanner-overlay" aria-modal="true" role="dialog" aria-label="QR Scanner">
  <video id="scanner-video" muted playsinline autoplay></video>
  <div id="scanner-ui">
    <div id="scanner-header">
      <span id="scanner-title">📖 Scan QR Code</span>
      <button id="scanner-close" type="button">Close</button>
    </div>
    <div id="scanner-reticle">
      <span></span><span></span><span></span><span></span>
    </div>
    <p id="scanner-hint">Point at a Blocky Bear QR code</p>
  </div>
  <div id="scanner-error">
    <p>📷 Camera access was denied.<br><br>Please allow camera permissions in your browser settings and try again.</p>
  </div>
</div>

<!-- PERSISTENT SCAN BUTTON (shown after game starts) -->
<button id="scan-btn" type="button" aria-label="Scan QR Code">📷</button>

<!-- FULL-SCREEN SCENE BACKGROUND -->
<div id="scene" data-s="0"></div>

<!-- DEPTH LAYERS: foreground trees, path glow, center glow, vignette -->
<div class="depth-tree left"  aria-hidden="true"></div>
<div class="depth-tree right" aria-hidden="true"></div>
<div id="depth-path"          aria-hidden="true"></div>
<div id="depth-center-glow"   aria-hidden="true"></div>
<div id="depth-light-glow"    aria-hidden="true"></div>
<div id="depth-vignette"      aria-hidden="true"></div>

<!-- ARCH OVERLAY (Chapter 1 only) -->
<div id="arch-overlay">
  <!-- Arch is embedded in the SVG scene for ch0; this is just a hook for JS toggle -->
</div>

<!-- BEAR OVERLAY -->
<div id="bear-overlay">
  <div id="bear-scene" class="idle">
    <div id="speech-bubble">Welcome!</div>
    <div id="bear-ground-shadow"></div>
    <div id="bear-img-wrap">
      <img id="bear-img" alt="Blocky Bear" draggable="false" style="visibility:hidden"/>
      <div id="bear-blink-overlay" aria-hidden="true">
        <svg viewBox="0 0 100 28" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <rect x="8"  y="0" width="35" height="28" rx="14" fill="#1a0c04" opacity="0.96"/>
          <rect x="57" y="0" width="35" height="28" rx="14" fill="#1a0c04" opacity="0.96"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- TOP HUD -->
<div id="top-hud">
  <div id="title-pill">📖 Blocky Bear Story Hunt</div>
  <div id="progress-row" aria-label="Story pages found"></div>
</div>

<!-- CHAPTER SIGN -->

  <div id="chapter-pill">
    <div id="chapter-num"></div>

  </div>
</div>

<!-- TAP TO REPLAY -->

<!-- EFFECTS -->

<!-- FINAL CARD -->
<div id="final-screen" aria-hidden="true">
  <div id="final-card">
    <div class="fc-eyebrow">Story Complete!</div>
    <div class="fc-title">You Found<br>Every Page!</div>
    <div class="fc-body">
      You helped Blocky Bear put the whole story back together!<br><br>
      Bring this screen to the <strong>Manager's Office on the north side</strong> to claim your prize!
    </div>

    <div class="fc-btns">
      <button class="fc-btn ghost"   id="btn-replay" type="button">🎉 Replay Ending</button>
      <button class="fc-btn primary" id="btn-done"   type="button">Done!</button>
    </div>
  </div>
</div>

<!-- START SCREEN -->
<div id="start-screen">
  <div id="start-bg"></div>
  <div id="start-content">
    <!-- Header pill -->
    <div id="start-header-pill">📖 Blocky Bear Story Hunt</div>

    <!-- Info card -->
    <div id="start-card">
      <div id="start-title">Blocky Bear<br>Story Hunt</div>
      <div id="start-chapter-info"></div>
      <div id="start-subtitle">Help Blocky Bear find all the missing story pages!</div>
    </div>

    <!-- Bear -->
    <div id="start-bear-wrap">
      <img id="start-bear-preview" alt="Blocky Bear" style="display:none"/>
      <div id="start-ground-shadow"></div>
    </div>

    <!-- CTA button -->
    <div id="start-btn-wrap">
      <button id="start-btn" type="button">✨ Let's Go!</button>
    </div>
  </div>
</div>

<script>
(function(){
"use strict";


// ── SCENE SYSTEM ──────────────────────────────────────────
var sceneEl  = document.getElementById("scene");
var archEl   = document.getElementById("arch-overlay");

function applyScene(idx){
  if(sceneEl) sceneEl.setAttribute("data-s", String(idx));
  // Arch only on Chapter 1
  if(archEl) archEl.classList.toggle("show", idx===0);
}


// ── CHAPTER CONFIG (LOCKED) ───────────────────────────────
var CHAPTERS=[
  {num:1,title:"The Entrance",       audio:"clue_01_entry.mp3"},
  {num:2,title:"The Hungry Bear",    audio:"clue_02_eatery.mp3"},
  {num:3,title:"The Picnic Field",   audio:"clue_03_pavilion.mp3"},
  {num:4,title:"The Sunny Meadow",   audio:"clue_04_grass.mp3"},
  {num:5,title:"The Big Show",       audio:"clue_05_office.mp3"},
  {num:6,title:"The Secret Room",    audio:"clue_06_stage.mp3"},
  {num:7,title:"Behind the Curtain", audio:"clue_07_behindstage.mp3"},
  {num:8,title:"The Story Ends",     audio:"clue_08_books.mp3"},
];
var AP="assets/audio/";

// ── URL ROUTING ───────────────────────────────────────────
// Reads ?c=1..8 (new QR format), ?gate=1 (ch1), or ?step=2..8 (legacy).
// Returns 0-based chapter index, or null → show start screen.
function getChapterIdx(){
  var p=new URLSearchParams(window.location.search);
  // New format: ?c=1 through ?c=8
  if(p.has("c")){
    var c=parseInt(p.get("c"),10);
    if(c>=1&&c<=8) return c-1;
  }
  // Legacy: ?gate=1 → chapter 1
  if(p.has("gate")&&p.get("gate")==="1") return 0;
  // Legacy: ?step=2..8
  if(p.has("step")){var n=parseInt(p.get("step"),10);if(n>=2&&n<=8) return n-1;}
  return null; // no valid param → start screen
}
var TARGET_IDX=getChapterIdx();
// NOTE: applyScene is NOT called here — it runs inside bootstrap() after start button press

// ── STATE ─────────────────────────────────────────────────
var audioUnlocked=false,blinkTO=null,twitchTO=null,talkIV=null,bgFadeIV=null,celTok=0,correctN=0;
var ANIM_STATES=["idle","talking","happy","confused","blinking","twitch","entering"];

// ── DOM ───────────────────────────────────────────────────
var $=function(id){return document.getElementById(id);};
var startScr=$("start-screen"),bearScene=$("bear-scene"),bubble=$("speech-bubble");
var progRow=$("progress-row"),chLabel=$("chapter-label"),chNum=$("chapter-num"),chTitleEl=$("chapter-title-text");
var tapPlay=$("tap-play"),fxLayer=$("effects-layer"),finalScr=$("final-screen"),glowEl=$("final-glow"),bannerEl=$("rainbow-banner");

// ── AUDIO ─────────────────────────────────────────────────
var BG_FULL=0.32,  // bg_loop plays quietly under voice
    BG_DUCK=0.06,  // ducked while voice is playing
    BG_FINAL=0.18; // bg_final volume level

var sfx   = new Audio();          // voice / sfx channel
var bgLoop= new Audio();          // bg_loop.mp3 — looping hunt music
var bgFin = new Audio();          // bg_final.mp3 — end-state music

sfx.preload    = "auto"; sfx.playsInline = true;
bgLoop.preload = "auto"; bgLoop.loop = true;  bgLoop.playsInline = true; bgLoop.volume = BG_FULL;
bgFin.preload  = "auto"; bgFin.loop  = true;  bgFin.playsInline  = true; bgFin.volume  = 0;

// Alias: keep existing bg reference pointing at bgLoop so all fadeBg calls still work
var bg = bgLoop;

function fadeBg(to,ms){
  ms=ms||300; if(bgFadeIV) clearInterval(bgFadeIV);
  var from=bg.volume,diff=to-from,steps=Math.max(1,Math.round(ms/28)),s=0;
  bgFadeIV=setInterval(function(){
    s++;bg.volume=Math.max(0,Math.min(BG_FULL,from+diff*(s/steps)));
    if(s>=steps){clearInterval(bgFadeIV);bgFadeIV=null;}
  },28);
}

// Start bg_loop if not already running
function startBgLoop(){
  if(!audioUnlocked||!bgLoop.paused) return;
  bgLoop.src=AP+"bg_loop.mp3"; bgLoop.load();
  bgLoop.volume=BG_FULL;
  bgLoop.play().catch(function(){});
}

function playAudio(file,cb){
  if(!audioUnlocked){if(cb) setTimeout(cb,100);return;}
  startBgLoop();
  fadeBg(BG_DUCK,130);
  sfx.pause();sfx.currentTime=0;sfx.src=AP+file;sfx.load();sfx.onended=sfx.onerror=null;
  startTalk();
  var done=function(){stopTalk();fadeBg(BG_FULL,380);if(cb) cb();};
  sfx.onended=done;sfx.onerror=done;
  var p=sfx.play();
  if(p&&p.catch) p.catch(function(err){
    if(err&&err.name==="NotAllowedError") tapPlay.classList.add("show");
    done();
  });
}

// Maps chapterIdx (0-based) to correct audio:
// arriving at ch2 (idx=1) plays correct_01, ..., arriving at ch8 (idx=7) skips to cb (final flow)
var CORRECT_FILES=[
  "correct_01.mp3","correct_02.mp3","correct_03.mp3","correct_04.mp3",
  "correct_05.mp3","correct_06.mp3","correct_07.mp3"
];
function playCorrect(chapterIdx,cb){
  // chapterIdx is the chapter we JUST LEFT (0-based)
  // 0→correct_01 .. 6→correct_07, 7→no file (final.mp3 used in finishHunt)
  var file=CORRECT_FILES[chapterIdx];
  if(file){ playAudio(file,cb); } else { if(cb) cb(); }
}

function playWrong(){
  playAudio("wrong.mp3",null);
}

function unlockAudio(){
  if(audioUnlocked) return;
  audioUnlocked=true;
  tapPlay.classList.remove("show");
  // bg_loop starts after opening.mp3 finishes (see bootstrap),
  // or immediately here if jumping into mid-hunt chapter
  if(TARGET_IDX!==null&&TARGET_IDX!==0){
    bgLoop.src=AP+"bg_loop.mp3"; bgLoop.load();
    bgLoop.volume=BG_FULL;
    bgLoop.play().catch(function(){});
  }

var IDLE_CANDIDATES=[BEAR_EMBEDDED,"assets/bear_idle.png","assets/blocky_bear.png"];
var BEAR={idle:IDLE_CANDIDATES[0],talk1:"assets/bear_talk_1.png",talk2:"assets/bear_talk_2.png",blink:"assets/bear_blink.png"};
var OK={idle:false};

function probeIdleBear(){
  var si=$("start-bear-preview"),mi=$("bear-img");
  function ok(src){BEAR.idle=src;OK.idle=true;si.onload=si.onerror=null;si.src=src;si.style.display="";mi.onload=mi.onerror=null;mi.src=src;mi.style.visibility="";}
  function fail(){OK.idle=false;BEAR.idle="";var e1=document.createElement("div");e1.className="bear-emoji-fallback";e1.textContent="🐻";if(si.parentNode) si.parentNode.replaceChild(e1,si);var e2=document.createElement("div");e2.className="bear-emoji-fallback";e2.style.fontSize="clamp(120px,32vw,160px)";e2.style.visibility="";e2.textContent="🐻";if(mi.parentNode) mi.parentNode.replaceChild(e2,mi);}
  function tryNext(i){if(i>=IDLE_CANDIDATES.length){fail();return;}var src=IDLE_CANDIDATES[i];if(src.slice(0,5)==="data:"){ok(src);return;}var p=new Image();p.onload=function(){ok(src);};p.onerror=function(){tryNext(i+1);};p.src=src;}
  tryNext(0);
}
function preloadOptional(){["talk1","talk2","blink"].forEach(function(k){var img=new Image();img.onload=function(){OK[k]=true;};img.onerror=function(){OK[k]=false;};img.src=BEAR[k];});}

// ── BEAR ANIMATION ────────────────────────────────────────
function clearBear(){var keep=Array.prototype.slice.call(arguments);ANIM_STATES.forEach(function(s){if(keep.indexOf(s)===-1) bearScene.classList.remove(s);});}
function setIdle(){clearBear("idle");bearScene.classList.add("idle");if(talkIV){clearInterval(talkIV);talkIV=null;}var bi=$("bear-img");if(bi&&BEAR.idle) bi.src=BEAR.idle;}
function startTalk(){clearBear("talking");bearScene.classList.add("talking");if(OK.talk1&&OK.talk2){var tog=false,bi=$("bear-img");if(talkIV) clearInterval(talkIV);talkIV=setInterval(function(){if(bi){bi.src=tog?BEAR.talk2:BEAR.talk1;tog=!tog;}},185);}}
function stopTalk(){clearBear("idle");bearScene.classList.add("idle");if(talkIV){clearInterval(talkIV);talkIV=null;}var bi=$("bear-img");if(bi&&BEAR.idle) bi.src=BEAR.idle;}
function bearHappy(){clearBear("happy");bearScene.classList.add("happy");setTimeout(setIdle,1100);}
function doBlink(){var bi=$("bear-img");if(!bi) return;if(OK.blink){var prev=bi.src;bi.src=BEAR.blink;setTimeout(function(){if(bi.src===BEAR.blink) bi.src=prev;},160);}else{bearScene.classList.add("blinking");setTimeout(function(){bearScene.classList.remove("blinking");},300);}}
function startBlinkLoop(){if(blinkTO) clearTimeout(blinkTO);var loop=function(){blinkTO=setTimeout(function(){doBlink();if(Math.random()<.15) setTimeout(doBlink,280);loop();},2800+Math.random()*3700);};loop();}
function startTwitchLoop(){if(twitchTO) clearTimeout(twitchTO);var next=function(){twitchTO=setTimeout(function(){if(!["talking","happy"].some(function(s){return bearScene.classList.contains(s);})){bearScene.classList.add("twitch");setTimeout(function(){bearScene.classList.remove("twitch");},550);}next();},4000+Math.random()*5000);};next();}

function showBear(text){
  var wasHidden=!bearScene.classList.contains("visible");
  bearScene.classList.add("visible");bubble.classList.add("visible");
  if(text!=null) bubble.textContent=text;
  if(wasHidden){bearScene.classList.add("entering");setTimeout(function(){bearScene.classList.remove("entering");},700);}
}

// ── PROGRESS ─────────────────────────────────────────────
function renderProg(found){
  progRow.innerHTML="";
  CHAPTERS.forEach(function(_,i){var d=document.createElement("div");d.className="pg-dot"+(i<found?" found":"");progRow.appendChild(d);});
}
function popDot(idx){var dots=progRow.querySelectorAll(".pg-dot");if(dots[idx]){dots[idx].classList.add("pop");setTimeout(function(){dots[idx].classList.remove("pop");},400);}}

// ── EFFECTS ───────────────────────────────────────────────
var EMOJIS=["⭐","✨","📖","🌟","💫","📜","🍀"];
var COLS=["#ffb6d9","#9fdfff","#ffe48e","#baf0ad","#ffffff","#ffd97a"];
function getBearOrigin(){var r=bearScene.getBoundingClientRect();if(r.width===0) return{x:window.innerWidth*.5,y:window.innerHeight*.65};return{x:r.left+r.width*.5,y:r.top+r.height*.42};}
function spawnFx(count,dur,isFinal){
  if(document.hidden) return;
  var tok=++celTok;fxLayer.innerHTML="";var o=getBearOrigin();var n=Math.round(count*((navigator.deviceMemory||4)<2?.5:1));
  for(var i=0;i<n;i++){
    var el=document.createElement("div");
    if(Math.random()>.42){el.className="fx-piece";el.textContent=EMOJIS[i%EMOJIS.length];}
    else{el.className="fx-dot";var s=7+Math.random()*10;el.style.width=el.style.height=s+"px";el.style.background=COLS[i%COLS.length];el.style.boxShadow="0 0 6px 2px "+COLS[i%COLS.length];}
    el.style.left=o.x+"px";el.style.top=o.y+"px";
    if(isFinal){var angle=Math.random()*Math.PI*2;var dist=100+Math.random()*Math.max(window.innerWidth,window.innerHeight)*.62;el.style.setProperty("--tx",(Math.cos(angle)*dist)+"px");el.style.setProperty("--ty",(Math.sin(angle)*dist-100)+"px");el.style.setProperty("--rot",(-200+Math.random()*400)+"deg");var d=4.8+Math.random()*1.2;el.style.animation="fxFinalBurst "+d.toFixed(2)+"s ease-out "+(Math.random()*.22).toFixed(2)+"s forwards";}
    else{el.style.setProperty("--tx",(Math.random()-.5)*360+"px");el.style.setProperty("--ty",-(120+Math.random()*160)+"px");el.style.setProperty("--rot",(-180+Math.random()*360)+"deg");el.style.setProperty("--rot-start",(-30+Math.random()*60)+"deg");el.style.animation="fxRise "+(dur/1000*.88).toFixed(2)+"s ease-out "+(Math.random()*.14).toFixed(2)+"s forwards";}
    fxLayer.appendChild(el);
  }
  setTimeout(function(){if(celTok===tok) fxLayer.innerHTML="";},dur+400);
}
function bigCelebration(){spawnFx(160,6500,true);[glowEl,bannerEl].forEach(function(el){el.classList.remove("show");void el.offsetWidth;el.classList.add("show");});setTimeout(function(){glowEl.classList.remove("show");bannerEl.classList.remove("show");},7000);}

// ── CHAPTER LABEL ─────────────────────────────────────────
function setChapterLabel(idx){var ch=CHAPTERS[idx];if(!ch){chLabel.classList.add("hidden");return;}chNum.textContent="Chapter "+ch.num;chTitleEl.textContent=ch.title;chLabel.classList.remove("hidden");}

// ── PLAY CLUE ─────────────────────────────────────────────
function playClue(idx){var ch=CHAPTERS[idx];if(!ch) return;tapPlay.classList.remove("show");tapPlay.onclick=function(){tapPlay.classList.remove("show");playClue(idx);};showBear(ch.title);playAudio(ch.audio,null);}

// ── BOOTSTRAP ─────────────────────────────────────────────
function bootstrap(idx){
  startScr.classList.add("hidden");applyScene(idx);renderProg(idx);setChapterLabel(idx);showBear(CHAPTERS[idx].title);startBlinkLoop();startTwitchLoop();
  if(idx===0){
    // Chapter 1: play opening, then start bg_loop, then play clue
    playAudio("opening.mp3",function(){
      startBgLoop();
      setTimeout(function(){playClue(0);},200);
    });
  } else {
    // Chapters 2–8: play correct chime for arriving at this chapter, then clue
    bearHappy();popDot(idx-1);renderProg(idx);
    playCorrect(idx-1,function(){
      spawnFx(20,2800,false);
      setTimeout(function(){playClue(idx);},2600);
    });
  }
}
function finishHunt(idx){
  bearHappy();popDot(idx);renderProg(idx+1);
  // Fade bg_loop out, bring in bg_final underneath final voice
  fadeBg(0,800);
  setTimeout(function(){
    bgLoop.pause();
    bgFin.src=AP+"bg_final.mp3"; bgFin.load();
    bgFin.volume=BG_FINAL;
    bgFin.play().catch(function(){});
    playAudio("final.mp3",function(){
      bigCelebration();
      setTimeout(function(){finalScr.classList.add("show");},5600);
    });
  },600);
}

// ── INIT START SCREEN ─────────────────────────────────────
function initStartScreen(){
  var btn=$("start-btn"),info=$("start-chapter-info"),sub=$("start-subtitle");
  if(TARGET_IDX!==null){
    var ch=CHAPTERS[TARGET_IDX];info.style.display="block";
    if(TARGET_IDX===0){info.textContent="Chapter 1 — "+ch.title;sub.textContent="Your adventure begins here!";btn.textContent="✨ Start the Hunt!";}
    else if(TARGET_IDX===CHAPTERS.length-1){info.innerHTML="Chapter "+ch.num+"<br>"+ch.title;sub.textContent="You found the final clue!";btn.textContent="🐻 Final Chapter!";}
    else{info.innerHTML="Chapter "+ch.num+"<br>"+ch.title;sub.textContent="You found the next clue!";btn.textContent="🐻 Continue!";}
  }
  btn.addEventListener("click",function(){
    document.body.classList.add("started");
    unlockAudio();
    var idx=TARGET_IDX!==null?TARGET_IDX:0;
    if(idx===CHAPTERS.length-1){
      // Last chapter scanned — play correct chime, then clue, then finish
      startScr.classList.add("hidden");applyScene(idx);renderProg(idx);setChapterLabel(idx);showBear(CHAPTERS[idx].title);startBlinkLoop();startTwitchLoop();
      bearHappy();popDot(idx-1);renderProg(idx);
      playCorrect(idx-1,function(){
        spawnFx(20,2800,false);
        setTimeout(function(){
          showBear(CHAPTERS[idx].title);
          tapPlay.classList.remove("show");
          tapPlay.onclick=function(){tapPlay.classList.remove("show");finishHunt(idx);};
          playAudio(CHAPTERS[idx].audio,function(){finishHunt(idx);});
        },2600);
      });
    } else {
      bootstrap(idx);
    }
  });
}

// ── EVENTS ────────────────────────────────────────────────
$("btn-replay").addEventListener("click",function(){finalScr.classList.remove("show");bigCelebration();setTimeout(function(){playAudio("final.mp3",null);},300);});
$("btn-done").addEventListener("click",function(){finalScr.classList.remove("show");});
document.body.addEventListener("click",   unlockAudio,{once:true});
document.body.addEventListener("touchend",unlockAudio,{once:true});
window.addEventListener("beforeunload",function(){sfx.pause();bgLoop.pause();bgFin.pause();});

// ── QR SCANNER ────────────────────────────────────────────
(function(){
  var overlay  = document.getElementById("scanner-overlay");
  var video    = document.getElementById("scanner-video");
  var closeBtn = document.getElementById("scanner-close");
  var scanBtn  = document.getElementById("scan-btn");
  var errEl    = document.getElementById("scanner-error");

  var reader   = null;   // ZXing reader instance
  var stream   = null;   // MediaStream — kept so we can stop tracks
  var scanning = false;

  // Map QR text → 0-based chapter index
  // Accepts:  URL with ?c=N,  bare "c=N",  or just the digit "N"
  function parseQR(text){
    text=(text||"").trim();
    // Full URL or query string
    try{
      var url=new URL(text.indexOf("http")===-1?"https://x/?"+text:text);
      var c=parseInt(url.searchParams.get("c"),10);
      if(c>=1&&c<=8) return c-1;
    }catch(e){}
    // Bare digit
    var d=parseInt(text,10);
    if(d>=1&&d<=8) return d-1;
    return null;
  }

  function stopStream(){
    if(stream){
      stream.getTracks().forEach(function(t){t.stop();});
      stream=null;
    }
    if(reader){
      try{reader.reset();}catch(e){}
      reader=null;
    }
    video.srcObject=null;
    scanning=false;
  }

  function closeScanner(){
    stopStream();
    overlay.classList.remove("open");
    errEl.classList.remove("show");
  }

  function onScanSuccess(idx){
    closeScanner();
    handleScannedChapter(idx);
  }

  function startScanner(){
    if(scanning) return;
    errEl.classList.remove("show");
    overlay.classList.add("open");

    if(!window.ZXing){
      errEl.querySelector("p").textContent="QR library not loaded. Please check your connection.";
      errEl.classList.add("show"); return;
    }

    navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}
    }).then(function(str){
      stream=str;
      video.srcObject=stream;
      video.play().catch(function(){});
      scanning=true;

      reader=new ZXing.BrowserMultiFormatReader();
      // Use decodeFromStream to avoid creating a second getUserMedia call
      reader.decodeFromStream(stream, video, function(result, err){
        if(result){
          var idx=parseQR(result.getText());
          if(idx!==null) onScanSuccess(idx);
          // If idx===null (unrecognised QR) keep scanning silently
        }
        // ZXing passes NotFoundException on every empty frame — ignore it
      });
    }).catch(function(err){
      scanning=false;
      if(err&&(err.name==="NotAllowedError"||err.name==="PermissionDeniedError")){
        errEl.classList.add("show");
      } else {
        errEl.querySelector("p").textContent="Camera could not be started. Please try again.";
        errEl.classList.add("show");
      }
    });
  }

  scanBtn.addEventListener("click", function(){
    unlockAudio(); // ensure audio context is alive
    startScanner();
  });
  closeBtn.addEventListener("click", closeScanner);

  // Close on overlay background tap (not on video/UI elements)
  overlay.addEventListener("click", function(e){
    if(e.target===overlay) closeScanner();
  });

  // Pause scanner when tab is hidden, resume when visible
  document.addEventListener("visibilitychange", function(){
    if(document.hidden) stopStream();
  });
}());

// ── HANDLE SCANNED CHAPTER ────────────────────────────────
// Called by QR scanner with 0-based chapter idx.
// Unified routing: works whether game has started or not.
function handleScannedChapter(idx){
  unlockAudio();
  document.body.classList.add("started");
  var last=CHAPTERS.length-1;
  if(idx===last){
    // Final chapter scanned
    var startScreen=document.getElementById("start-screen");
    startScreen.classList.add("hidden");
    applyScene(idx);renderProg(idx);setChapterLabel(idx);
    showBear(CHAPTERS[idx].title);startBlinkLoop();startTwitchLoop();
    bearHappy();popDot(idx-1);renderProg(idx);
    playCorrect(idx-1,function(){
      spawnFx(20,2800,false);
      setTimeout(function(){
        showBear(CHAPTERS[idx].title);
        var tp=document.getElementById("tap-play");
        tp.classList.remove("show");
        tp.onclick=function(){tp.classList.remove("show");finishHunt(idx);};
        playAudio(CHAPTERS[idx].audio,function(){finishHunt(idx);});
      },2600);
    });
  } else {
    bootstrap(idx);
  }
}

// ── BOOT ──────────────────────────────────────────────────
probeIdleBear();preloadOptional();initStartScreen();

}());
