<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Block — Leprechaun Gold Hunt</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

  <style>
    :root{
      --bg0:#0b2b16;
      --bg1:#14522a;
      --card:rgba(8,40,20,.78);
      --stroke:rgba(255,255,255,.12);
      --ink:#f7fff7;
      --muted:rgba(247,255,247,.76);
      --gold:#ffd56a;
      --gold2:#ffb84a;
      --green:#42e58f;
      --bubble:rgba(255,255,255,.10);
      --bubbleStroke:rgba(255,255,255,.14);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1000px 650px at 50% 12%, rgba(255,213,106,.14), rgba(0,0,0,0) 60%),
        radial-gradient(1200px 900px at 50% 45%, rgba(66,229,143,.16), rgba(0,0,0,0) 58%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:24px;
      box-shadow:0 16px 42px rgba(0,0,0,.30);
      backdrop-filter: blur(10px);
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:14px 18px;
      font:800 16px/1 Poppins,system-ui,sans-serif;
      letter-spacing:.2px;
      cursor:pointer;
      transition:transform .14s ease, filter .14s ease, opacity .14s ease;
      user-select:none;
    }
    .btn:active{transform:scale(.98)}
    .btnPrimary{
      background:linear-gradient(135deg,var(--gold),var(--gold2));
      color:#1b1300;
      box-shadow:0 14px 36px rgba(255,195,90,.22);
    }
    .btnGhost{
      background:rgba(255,255,255,.10);
      border:1px solid var(--stroke);
      color:var(--ink);
    }

    .pill{
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.08);
      padding:8px 12px;
      font-size:12px;
      color:var(--muted);
    }

    .title{
      font-weight:900;
      letter-spacing:.3px;
      line-height:1.02;
      font-size:clamp(30px,7vw,54px);
      color:var(--gold);
      text-shadow:0 0 22px rgba(255,205,110,.18);
    }

    .sub{
      color:rgba(247,255,247,.86);
      font-size:16px;
      line-height:1.35;
    }

    #fxCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:30;
      pointer-events:none;
    }

    #gate{
      position:fixed;
      inset:0;
      z-index:200;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:
        radial-gradient(1200px 800px at 50% 20%, rgba(255,213,106,.16), rgba(0,0,0,0) 60%),
        radial-gradient(1100px 800px at 50% 30%, rgba(66,229,143,.14), rgba(0,0,0,0) 64%),
        linear-gradient(180deg,#0c3a1d,#06150c);
    }

    .heroLep{
      width:110px;
      height:110px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(48px 48px at 30% 30%, rgba(255,213,106,.24), rgba(0,0,0,0) 60%),
        radial-gradient(60px 60px at 75% 75%, rgba(66,229,143,.18), rgba(0,0,0,0) 62%),
        rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }
    .heroLep > div,
    .lepStage > div,
    .finalLep > div{
      width:112%;
      height:112%;
    }

    .topTitle{
      text-align:center;
    }
    .topTitle .eyebrow{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:2px;
      color:rgba(247,255,247,.74);
      margin-bottom:4px;
    }
    .topTitle .main{
      font-size:34px;
      line-height:1.05;
      font-weight:900;
      color:var(--gold);
    }

    .progressWrap{
      padding:18px 18px 16px;
    }
    .progressHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .progressHead .label{
      font-size:18px;
      font-weight:800;
    }
    .progressHead .count{
      font-size:15px;
      font-weight:800;
      color:var(--gold);
    }
    .progressBar{
      height:18px;
      width:100%;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      overflow:hidden;
      position:relative;
    }
    .progressFill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#ff6f61,#ffb84a,#ffe066,#42e58f,#3cc7ff,#8d6bff);
      box-shadow:0 0 16px rgba(255,213,106,.24);
      transition:width .35s ease;
    }
    .progressDots{
      margin-top:12px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
    }
    .progressDot{
      width:12px;
      height:12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.08);
    }
    .progressDot.done{
      background:var(--gold);
      box-shadow:0 0 12px rgba(255,213,106,.26);
    }

    .gameCard{ padding:20px; }

    .lepStage{
      width:150px;
      height:150px;
      margin:0 auto 8px;
      border-radius:30px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(60px 60px at 30% 30%, rgba(255,213,106,.26), rgba(0,0,0,0) 60%),
        radial-gradient(80px 80px at 70% 70%, rgba(66,229,143,.18), rgba(0,0,0,0) 62%),
        rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      box-shadow:0 12px 28px rgba(0,0,0,.18);
    }

    .speechBubble{
      position:relative;
      margin-top:8px;
      padding:18px 18px 16px;
      border-radius:22px;
      background:var(--bubble);
      border:1px solid var(--bubbleStroke);
      box-shadow:0 10px 30px rgba(0,0,0,.20);
      text-align:center;
    }
    .speechBubble:before{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      top:-12px;
      width:0;height:0;
      border-left:14px solid transparent;
      border-right:14px solid transparent;
      border-bottom:14px solid var(--bubbleStroke);
    }
    .speechBubble:after{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      top:-10px;
      width:0;height:0;
      border-left:13px solid transparent;
      border-right:13px solid transparent;
      border-bottom:13px solid var(--bubble);
    }

    .clueEyebrow{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:2px;
      color:rgba(247,255,247,.66);
      margin-bottom:6px;
    }
    .clueTitle{
      font-size:28px;
      line-height:1.05;
      font-weight:900;
      color:var(--gold);
      margin-bottom:12px;
    }
    .clueText{
      font-size:20px;
      line-height:1.45;
      white-space:pre-line;
      color:rgba(247,255,247,.96);
    }

    .scanCard{
      padding:18px;
      text-align:center;
    }
    .scanLabel{
      font-size:14px;
      font-weight:800;
      color:rgba(247,255,247,.84);
      letter-spacing:.6px;
      text-transform:uppercase;
    }
    .scanBig{
      margin-top:6px;
      font-size:24px;
      line-height:1.1;
      font-weight:900;
      color:var(--gold);
    }
    .scanFrame{
      margin-top:14px;
      border-radius:24px;
      border:3px dashed rgba(255,213,106,.52);
      overflow:hidden;
      position:relative;
      background:rgba(0,0,0,.28);
      min-height:260px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .scanFrame video{
      width:100%;
      height:auto;
      display:block;
    }
    .scanHelp{
      margin-top:12px;
      font-size:14px;
      line-height:1.35;
      color:rgba(247,255,247,.72);
    }

    .tinyActions{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .tinyBtn{
      font-size:13px;
      padding:10px 14px;
    }

    #settingsWrap{
      display:none;
      margin-top:12px;
    }
    #settingsWrap.show{display:block}
    .settingsCard{ padding:16px; }
    .settingsRow{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-top:10px;
    }

    #celebrateOverlay{
      position:fixed;
      inset:0;
      display:none;
      z-index:170;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.18);
      backdrop-filter:blur(4px);
      pointer-events:none;
    }
    #celebrateOverlay.show{ display:flex; }
    .celebrateCard{
      min-width:min(420px,92vw);
      text-align:center;
      padding:22px 18px;
      border-radius:28px;
      background:rgba(8,40,20,.88);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 18px 48px rgba(0,0,0,.28);
      transform:scale(.96);
      animation:popIn .18s ease forwards;
    }
    .celebrateText{
      font-size:34px;
      line-height:1.05;
      font-weight:900;
      color:var(--gold);
      text-shadow:0 0 18px rgba(255,213,106,.18);
    }
    .celebrateSub{
      margin-top:10px;
      font-size:18px;
      color:rgba(247,255,247,.92);
    }
    @keyframes popIn{
      from{transform:scale(.92);opacity:.2}
      to{transform:scale(1);opacity:1}
    }

    #toast{
      position:fixed;
      left:12px;
      bottom:12px;
      z-index:220;
      max-width:min(520px, 92vw);
      background:rgba(8,14,10,.88);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:10px 12px;
      font:12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color:rgba(242,255,244,.92);
      display:none;
      white-space:pre-wrap;
    }

    #finalOverlay{
      position:fixed;
      inset:0;
      z-index:180;
      display:none;
      background:
        radial-gradient(900px 520px at 50% 25%, rgba(255,213,106,.18), rgba(0,0,0,0) 70%),
        radial-gradient(1000px 700px at 50% 65%, rgba(66,229,143,.14), rgba(0,0,0,0) 65%),
        rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
    }
    #finalOverlay.show{display:flex}

    .finalLep{
      width:170px;
      height:170px;
      margin:0 auto 14px;
      border-radius:30px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(60px 60px at 30% 30%, rgba(255,213,106,.28), rgba(0,0,0,0) 60%),
        radial-gradient(80px 80px at 72% 72%, rgba(66,229,143,.18), rgba(0,0,0,0) 62%),
        rgba(255,255,255,.06);
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    @media (max-width: 520px){
      .gameCard{padding:16px}
      .lepStage{width:136px;height:136px}
      .clueTitle{font-size:24px}
      .clueText{font-size:18px}
      .scanBig{font-size:22px}
      .heroLep{width:96px;height:96px}
      .celebrateText{font-size:28px}
      .celebrateSub{font-size:16px}
    }
  </style>
</head>

<body>
  <canvas id="fxCanvas"></canvas>

  <div id="celebrateOverlay">
    <div class="celebrateCard">
      <div class="celebrateText" id="celebrateText">Lucky Find!</div>
      <div class="celebrateSub" id="celebrateSub">The next clue is ready.</div>
    </div>
  </div>

  <div class="max-w-md mx-auto px-3 py-4 space-y-4 relative z-50" id="appRoot"></div>

  <div id="gate">
    <div class="max-w-md w-full card p-5">
      <div class="flex items-center gap-4">
        <div class="heroLep" aria-hidden="true"><div id="gateLep"></div></div>
        <div>
          <div class="text-xs uppercase tracking-[2px]" style="color:rgba(247,255,247,.74)">The Block Presents</div>
          <div class="title mt-1">Leprechaun Gold Hunt</div>
        </div>
      </div>

      <p class="sub mt-4">
        Follow the leprechaun’s clues, scan the lucky QR codes, and find the treasure.
      </p>

      <div class="mt-4">
        <button class="btn btnPrimary w-full" id="btnStart">Start Hunt</button>
      </div>

      <div class="mt-4 flex items-center justify-between gap-2">
        <div class="pill">Kid-friendly adventure</div>
        <div class="pill">15 stops</div>
      </div>
    </div>
  </div>

  <div id="finalOverlay" class="items-center justify-center p-5">
    <div class="max-w-md w-full card p-6 text-center">
      <div class="finalLep"><div id="finalLep"></div></div>
      <div class="text-4xl font-extrabold" style="color:var(--gold)">You found the gold!</div>
      <div class="mt-3 text-base" style="color:rgba(247,255,247,.84)">
        Show this screen at the prize location to claim your treasure.
      </div>
      <div class="mt-5 flex gap-2">
        <button class="btn btnGhost w-full" id="btnFinalSound">Replay Finale</button>
        <button class="btn btnPrimary w-full" id="btnFinalDone">Done</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

<script>
const BUILD = "2026-03-06-09";

const assetUrl = (p) => {
  if (!p) return p;
  const sep = p.includes("?") ? "&" : "?";
  return `${p}${sep}v=${encodeURIComponent(BUILD)}`;
};

(function maybeReset(){
  const url = new URL(location.href);
  if(url.searchParams.get("reset")==="1"){
    Object.keys(localStorage).forEach(k => {
      if(String(k).startsWith("block-leprechaun-2026:")) localStorage.removeItem(k);
    });
    url.searchParams.delete("reset");
    history.replaceState({}, "", url.toString());
  }
})();

const EVENT_ID = "block-leprechaun-2026";

const GAME = {
  title: "The Block — Leprechaun Gold Hunt",
  finalId: "tavern_on_the_green",
  nodes: [
    { id:"benny_sausage_company", business:"Benny Sausage Company", stopTitle:"Pot O’ Sausages", clueText:
`A leprechaun danced and dropped his gold,

But stopped for sausages hot and bold.

If your nose says “YUM”
and tummy says “GO,”

You found the place
where sausages glow!`, order:1 },

    { id:"birria_estilo_zacatecas", business:"Birria Estilo Zacatecas", stopTitle:"Rainbow Taco Trail", clueText:
`At the end of the rainbow,
tacos await,

Dripping with magic
on every plate.

Follow the smell,
don’t be slow,

The leprechaun whispers,
“Tacos below!”`, order:2 },

    { id:"bubble_bliss", business:"Bubble Bliss", stopTitle:"Lucky Bubble Lab", clueText:
`No eating here,
don’t take a bite,

These fizzy treasures
are bath-time delight.

Potions that bubble,
sparkle, and hiss,

Find the leprechaun’s
bubbly bliss!`, order:3 },

    { id:"busy_bee_frozen_custard", business:"Busy Bee Frozen Custard", stopTitle:"Frozen Clover Cream", clueText:
`Buzz buzz buzz
goes the clover bee,

Guarding cold gold
for you and me.

Swirls of magic,
creamy and bright,

Find the frozen rainbow
delight!`, order:4 },

    { id:"chickys_coffee", business:"Chicky’s Coffee", stopTitle:"Leprechaun Energy Brew", clueText:
`A sleepy leprechaun
needed a sip,

Now he dances
and does a jig flip!

Follow the smell
of warm magic brew,

The lucky cup
is waiting for you.`, order:5 },

    { id:"dim_sum_dynasty", business:"Dim Sum Dynasty", stopTitle:"Fortune of Gold Dumplings", clueText:
`Tiny gold pillows,
steamy and round,

A leprechaun’s treasure
is almost found.

Lift the lid
and follow the steam,

Dumpling magic
like a dream!`, order:6 },

    { id:"el_chamo", business:"El Chamo", stopTitle:"Golden Pocket Feast", clueText:
`The leprechaun stuffed
his lucky gold,

Into warm pockets
crispy and bold.

If your nose starts
dancing too,

The golden pocket
waits for you!`, order:7 },

    { id:"enchanted_books", business:"Enchanted Books", stopTitle:"Spellbook of Shamrocks", clueText:
`A magical book
with clovers inside,

Hides secrets
the leprechauns can’t hide.

Turn the pages,
take a look,

Find the lucky
storybook!`, order:8 },

    { id:"link_link", business:"Link Link", stopTitle:"Golden Charm Forge", clueText:
`Clink clink clink
goes the gold,

Tiny treasures
shiny and bold.

Chains of luck
the leprechauns bring,

Find the place
where charms cling!`, order:9 },

    { id:"stackers_burgers", business:"Stackers Burgers", stopTitle:"Tower of Lucky Bites", clueText:
`High as a rainbow,
burgers stack,

A leprechaun
couldn’t resist a snack.

Follow the tower,
don’t delay,

Lucky burgers
lead the way!`, order:10 },

    { id:"thats_my_rez_sandwich", business:"That’s My Rez Sandwich", stopTitle:"Lucky Sandwich Stop", clueText:
`Bread and magic
stacked just right,

A leprechaun built
this tasty bite.

If your belly says “YES!”
and feet say “GO,”

The lucky sandwich shop
you now know!`, order:11 },

    { id:"the_boba_lounge", business:"The Boba Lounge", stopTitle:"Rainbow Bubble Brew", clueText:
`Floating pearls
in a magical cup,

The leprechaun
drank it all up.

Sip the rainbow,
follow the glow,

Find the bubbles
that dance below!`, order:12 },

    { id:"the_candy_bar", business:"The Candy Bar", stopTitle:"Treasure of Sweet Gold", clueText:
`Candy coins
and sugar delight,

Guarded by leprechauns
day and night.

Sweetest treasure,
shiny and bright,

Find the gold
of sugary light!`, order:13 },

    { id:"thicc_pizza", business:"Thicc Pizza", stopTitle:"Rectangle Gold Slice", clueText:
`Not round,
not square,

But long and bold,
with cheesy flair!

Follow the smell
of pizza delight,

The rectangle treasure
is in sight!`, order:14 },

    { id:"tavern_on_the_green", business:"Tavern on the Green", stopTitle:"Lucky Clover Tavern", clueText:
`Green lights glow
where stories are told,

Of clovers, rainbows,
and pots of gold.

Follow the glow,
don’t be shy,

The lucky tavern
stands nearby!`, order:15, isFinal:true }
  ],
  audio: {
    opening: assetUrl("assets/audio/opening.mp3"),
    finale: assetUrl("assets/audio/finale.mp3"),
    musicLoop: assetUrl("assets/audio/music_loop.mp3"),
    correct: [
      assetUrl("assets/audio/correct_01.mp3"),
      assetUrl("assets/audio/correct_02.mp3"),
      assetUrl("assets/audio/correct_03.mp3"),
      assetUrl("assets/audio/correct_04.mp3"),
      assetUrl("assets/audio/correct_05.mp3")
    ],
    wrong: [
      assetUrl("assets/audio/wrong_01.mp3"),
      assetUrl("assets/audio/wrong_02.mp3"),
      assetUrl("assets/audio/wrong_03.mp3"),
      assetUrl("assets/audio/wrong_04.mp3"),
      assetUrl("assets/audio/wrong_05.mp3")
    ],
    sfx: {
      coinBurst: assetUrl("assets/audio/sfx_coin_burst.mp3"),
      rainbowSweep: assetUrl("assets/audio/sfx_rainbow_sweep.mp3")
    }
  },
  anim: {
    idle: "assets/anim/lep_idle.json",
    talk: "assets/anim/lep_talk.json",
    happy: "assets/anim/lep_happy.json",
    oops: "assets/anim/lep_oops.json"
  }
};

const KEY = (k) => `${EVENT_ID}:${k}`;
const State = {
  team: localStorage.getItem(KEY("team")) || "",
  idx: Number(localStorage.getItem(KEY("idx")) || "0"),
  musicEnabled: localStorage.getItem(KEY("musicEnabled")) !== "0",
  voiceEnabled: localStorage.getItem(KEY("voiceEnabled")) !== "0",
  sfxEnabled: localStorage.getItem(KEY("sfxEnabled")) !== "0",
  done: localStorage.getItem(KEY("done")) === "1",
  settingsOpen: false
};

function saveState(){
  localStorage.setItem(KEY("team"), State.team);
  localStorage.setItem(KEY("idx"), String(State.idx));
  localStorage.setItem(KEY("musicEnabled"), State.musicEnabled ? "1" : "0");
  localStorage.setItem(KEY("voiceEnabled"), State.voiceEnabled ? "1" : "0");
  localStorage.setItem(KEY("sfxEnabled"), State.sfxEnabled ? "1" : "0");
  localStorage.setItem(KEY("done"), State.done ? "1" : "0");
}

const toastEl = document.getElementById("toast");
function toast(msg){
  toastEl.style.display = "block";
  toastEl.textContent = String(msg);
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(()=>{ toastEl.style.display="none"; }, 7000);
}
window.addEventListener("error", e => toast("Error: " + (e?.message || e)));
window.addEventListener("unhandledrejection", e => toast("Promise: " + (e?.reason?.message || e.reason || e)));

const Lep = (() => {
  const players = new Map();

  function mount(elId, mode="idle", loop=true){
    const el = document.getElementById(elId);
    if(!el) return;

    try{ players.get(elId)?.destroy(); }catch{}
    el.innerHTML = "";

    const path = GAME.anim[mode] || GAME.anim.idle;

    const player = lottie.loadAnimation({
      container: el,
      renderer: "svg",
      loop,
      autoplay: true,
      path
    });

    player.addEventListener("data_failed", () => {
      el.innerHTML = "<div style='width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(247,255,247,.65)'>lep</div>";
    });

    players.set(elId, player);
  }

  function pulse(elId, mode, ms=900){
    mount(elId, mode, true);
    clearTimeout(pulse._t?.[elId]);
    pulse._t = pulse._t || {};
    pulse._t[elId] = setTimeout(() => mount(elId, "idle", true), ms);
  }

  return { mount, pulse };
})();

const AudioEngine = (() => {
  let AC = null, masterGain = null, voGain = null, sfxGain = null;
  let buffers = new Map();
  let currentVO = null;
  let unlocked = false;

  const bg = new Audio();
  bg.loop = true;
  bg.preload = "auto";
  bg.crossOrigin = "anonymous";
  bg.src = GAME.audio.musicLoop;

  const LEVELS = {
    musicNormal: 0.35,
    musicDucked: 0.10,
    vo: 1.0,
    sfx: 0.9
  };

  bg.addEventListener("error", () => {
    const code = bg.error?.code;
    toast("Music error.\ncode=" + code + "\ncurrentSrc=" + (bg.currentSrc || ""));
  });

  function hasCtx(){ return !!(window.AudioContext || window.webkitAudioContext); }

  async function unlock(){
    if(unlocked) return true;

    if(hasCtx()){
      const Ctx = window.AudioContext || window.webkitAudioContext;
      AC = AC || new Ctx({ latencyHint: "interactive" });
      if(AC.state === "suspended"){
        try{ await AC.resume(); }catch{}
      }

      masterGain = masterGain || AC.createGain();
      voGain = voGain || AC.createGain();
      sfxGain = sfxGain || AC.createGain();

      masterGain.gain.value = 1.0;
      voGain.gain.value = State.voiceEnabled ? 1.0 : 0.0;
      sfxGain.gain.value = State.sfxEnabled ? 1.0 : 0.0;

      voGain.connect(masterGain);
      sfxGain.connect(masterGain);
      masterGain.connect(AC.destination);

      try{
        const osc = AC.createOscillator();
        const g = AC.createGain();
        g.gain.value = 0.0001;
        osc.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(AC.currentTime + 0.02);
      }catch{}
    }

    unlocked = true;
    return true;
  }

  async function load(url){
    if(!url || buffers.has(url) || !AC) return;
    try{
      const res = await fetch(url, { cache:"no-store" });
      if(!res.ok) return;
      const arr = await res.arrayBuffer();
      const buf = await new Promise((ok, no) => AC.decodeAudioData(arr, ok, no));
      buffers.set(url, buf);
    }catch{}
  }

  async function preloadCore(){
    if(!unlocked || !AC) return;
    await Promise.all([
      load(GAME.audio.opening),
      load(GAME.audio.finale),
      ...GAME.audio.correct.map(load),
      ...GAME.audio.wrong.map(load),
      load(GAME.audio.sfx.coinBurst),
      load(GAME.audio.sfx.rainbowSweep),
    ]);
  }

  async function playMusic(){
    if(!State.musicEnabled) return;
    try{
      bg.src = GAME.audio.musicLoop;
      bg.volume = LEVELS.musicNormal;
      await bg.play();
    }catch(e){
      toast("Music failed.\n" + (e?.message || e));
    }
  }

  function stopMusic(){
    try{
      bg.pause();
      bg.currentTime = 0;
    }catch{}
  }

  function duck(on){
    if(!State.musicEnabled) return;
    bg.volume = on ? LEVELS.musicDucked : LEVELS.musicNormal;
  }

  function stopNode(n){
    try{ n?.src?.stop(); }catch{}
    try{ n?.g?.disconnect(); }catch{}
  }

  function playBuffer(buf, {bus="sfx", vol=1, loop=false}={}){
    if(!AC || !buf) return null;
    const src = AC.createBufferSource();
    src.buffer = buf;
    src.loop = !!loop;

    const g = AC.createGain();
    g.gain.value = vol;

    if(bus === "vo"){ src.connect(g); g.connect(voGain); }
    else { src.connect(g); g.connect(sfxGain); }

    try{ src.start(0); }catch{}
    return {src, g};
  }

  function setToggles({music, voice, sfx}={}){
    if(typeof music === "boolean") State.musicEnabled = music;
    if(typeof voice === "boolean") State.voiceEnabled = voice;
    if(typeof sfx === "boolean") State.sfxEnabled = sfx;

    if(AC){
      try{ voGain.gain.value = State.voiceEnabled ? 1.0 : 0.0; }catch{}
      try{ sfxGain.gain.value = State.sfxEnabled ? 1.0 : 0.0; }catch{}
    }

    if(State.musicEnabled) playMusic();
    else stopMusic();

    saveState();
  }

  function pickNoRepeat(arr, last){
    if(!arr?.length) return null;
    if(arr.length === 1) return arr[0];
    let c = arr[Math.floor(Math.random() * arr.length)];
    if(c === last){
      c = arr[(arr.indexOf(c) + 1) % arr.length];
    }
    return c;
  }

  let lastWrong = null;

  async function playSFX(url){
    if(!unlocked || !State.sfxEnabled || !AC) return;
    await load(url);
    const buf = buffers.get(url);
    if(!buf) return;
    playBuffer(buf, {bus:"sfx", vol:LEVELS.sfx});
  }

  async function playVO(url){
    if(!unlocked || !State.voiceEnabled || !AC) return;
    await load(url);
    const buf = buffers.get(url);
    if(!buf) return;

    if(currentVO){ stopNode(currentVO); currentVO = null; }

    duck(true);
    currentVO = playBuffer(buf, {bus:"vo", vol:LEVELS.vo});
    const durationMs = Math.max(400, (buf.duration || 0) * 1000);

    clearTimeout(playVO._t);
    playVO._t = setTimeout(() => {
      currentVO = null;
      duck(false);
    }, durationMs + 60);
  }

  async function playWrong(){
    const url = pickNoRepeat(GAME.audio.wrong, lastWrong);
    lastWrong = url;
    await playVO(url);
  }

  return {
    unlock,
    preloadCore,
    playMusic,
    stopMusic,
    playVO,
    playWrong,
    playSFX,
    setToggles,
    get unlocked(){ return unlocked; }
  };
})();

let correctBag = [];
let activeCorrectAudio = null;
let activeCelebrationToken = 0;

function shuffleArray(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

async function playCorrectOnce(){
  const sounds = GAME.audio.correct;
  if(!sounds || !sounds.length) return;

  if(correctBag.length === 0){
    correctBag = [...sounds];
    shuffleArray(correctBag);
  }

  const pick = correctBag.pop();

  try{
    if(activeCorrectAudio){
      try{ activeCorrectAudio.pause(); }catch{}
      activeCorrectAudio = null;
    }

    const a = new Audio(pick);
    activeCorrectAudio = a;
    a.preload = "auto";
    a.volume = 1;
    a.currentTime = 0;

    await a.play();

    await new Promise(resolve => {
      const done = () => resolve();
      a.onended = done;
      a.onerror = done;
      setTimeout(done, 1600);
    });

    if(activeCorrectAudio === a){
      activeCorrectAudio = null;
    }
  }catch(e){
    console.log("correct sound failed", e);
  }
}

const CELEBRATION_LINES = [
  { title: "Lucky Find!", sub: "The next clue is ready." },
  { title: "Gold Stars!", sub: "You found the right spot." },
  { title: "Brilliant!", sub: "The leprechaun is impressed." },
  { title: "You Did It!", sub: "Onward to the next adventure." },
  { title: "Treasure Trail!", sub: "Keep chasing the rainbow." }
];
let celebrationBag = [];

function pickCelebrationLine(){
  if(celebrationBag.length === 0){
    celebrationBag = [...CELEBRATION_LINES];
    shuffleArray(celebrationBag);
  }
  return celebrationBag.pop();
}

async function showCelebration(){
  const overlay = document.getElementById("celebrateOverlay");
  const title = document.getElementById("celebrateText");
  const sub = document.getElementById("celebrateSub");
  const line = pickCelebrationLine();
  const token = ++activeCelebrationToken;

  title.textContent = line.title;
  sub.textContent = line.sub;
  overlay.classList.add("show");

  await new Promise(resolve => setTimeout(resolve, 1200));

  if(token === activeCelebrationToken){
    overlay.classList.remove("show");
  }
}

const FX = (() => {
  const canvas = document.getElementById("fxCanvas");
  const ctx = canvas.getContext("2d");
  let W=0,H=0,DPR=1;
  const parts = [];
  let running=false;

  function resize(){
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = Math.floor(window.innerWidth * DPR);
    H = Math.floor(window.innerHeight * DPR);
    canvas.width = W;
    canvas.height = H;
  }
  window.addEventListener("resize", resize, {passive:true});
  resize();

  function addCoinBurst(x,y,count=120){
    const cx=x*DPR, cy=y*DPR;
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const sp = (1 + Math.random()*3.5) * DPR;
      parts.push({
        x:cx,y:cy,
        vx:Math.cos(a)*sp,
        vy:Math.sin(a)*sp - (1.2*DPR),
        life:55 + Math.random()*35,
        r:(2.2 + Math.random()*2.8)*DPR,
        spin:(Math.random()*2-1)*0.25,
        t:Math.random()*Math.PI*2
      });
    }
  }

  function rainbowSweep(){
    parts.push({type:"rainbow", x:-W*0.3, life:48});
  }

  function tick(){
    if(!running) return;
    ctx.clearRect(0,0,W,H);

    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i];

      if(p.type==="rainbow"){
        p.life--;
        p.x += W*0.05;
        const w = W*0.55;
        const grad = ctx.createLinearGradient(p.x,0,p.x+w,0);
        grad.addColorStop(0,"rgba(255,0,100,0)");
        grad.addColorStop(0.15,"rgba(255,80,0,0.22)");
        grad.addColorStop(0.35,"rgba(255,230,0,0.20)");
        grad.addColorStop(0.55,"rgba(0,255,140,0.18)");
        grad.addColorStop(0.75,"rgba(0,170,255,0.16)");
        grad.addColorStop(1,"rgba(160,0,255,0)");
        ctx.fillStyle = grad;
        ctx.fillRect(p.x, 0, w, H);
        if(p.life<=0) parts.splice(i,1);
        continue;
      }

      p.life--;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.045*DPR;
      p.t += p.spin;

      const alpha = Math.max(0, Math.min(1, p.life/70));
      ctx.globalAlpha = alpha;

      ctx.fillStyle = "rgba(255,213,106,0.95)";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r*(1.2 + 0.25*Math.sin(p.t)), p.r, p.t, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.ellipse(p.x - p.r*0.25, p.y - p.r*0.25, p.r*0.35, p.r*0.22, p.t, 0, Math.PI*2);
      ctx.fill();

      if(p.life<=0) parts.splice(i,1);
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }

  function ensure(){
    if(running) return;
    running=true;
    requestAnimationFrame(tick);
  }

  return {
    rainbow(){ ensure(); rainbowSweep(); },
    coinBurst(x,y,count){ ensure(); addCoinBurst(x,y,count); }
  };
})();

const Scanner = (() => {
  let reader = null;
  let scanLock = false;
  let wrongCooldown = false;

  function normalize(t){
    return ("" + t).trim().toLowerCase();
  }

  function stop(){
    try{ reader?.reset(); }catch{}
    reader = null;
    scanLock = false;
    wrongCooldown = false;

    try{
      const v = document.getElementById("preview");
      const s = v?.srcObject;
      if(s?.getTracks) s.getTracks().forEach(t => t.stop());
      if(v) v.srcObject = null;
    }catch{}
  }

  async function start(expectedId, onHit){
    stop();

    scanLock = false;
    wrongCooldown = false;

    const expected = normalize(expectedId);
    const videoEl = document.getElementById("preview");

    if(!videoEl) throw new Error("preview <video> missing");
    if(!navigator.mediaDevices?.getUserMedia){
      throw new Error("Camera not available (HTTPS required).");
    }

    const warm = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    videoEl.srcObject = warm;
    await videoEl.play().catch(() => {});

    let deviceId = null;
    try{
      const devices = await ZXing.BrowserMultiFormatReader.listVideoInputDevices();
      if(devices?.length){
        const back = devices.find(d => /back|rear|environment/i.test(d.label));
        deviceId = (back || devices.at(-1)).deviceId;
      }
    }catch{}

    reader = new ZXing.BrowserMultiFormatReader();

    await reader.decodeFromVideoDevice(deviceId, "preview", async (result) => {
      if(scanLock) return;
      if(!result) return;

      const got = normalize(result.getText());

      if(got === expected){
        scanLock = true;

        try{ reader?.reset(); }catch{}
        try{
          const s = videoEl?.srcObject;
          if(s?.getTracks) s.getTracks().forEach(t => t.stop());
          if(videoEl) videoEl.srcObject = null;
        }catch{}

        onHit?.(got);
        return;
      }

      if(!wrongCooldown){
        wrongCooldown = true;
        Lep.pulse("lepMain", "oops", 900);

        if(navigator.vibrate){
          navigator.vibrate([80,60,80]);
        }

        await AudioEngine.playWrong();
        toast("Oops! Try a different spot.");

        setTimeout(() => {
          wrongCooldown = false;
        }, 1200);
      }
    });
  }

  return { start, stop };
})();

}

function render(){
  if(State.done){
    Scanner.stop();
    showFinal();
    return;
  }

  const total = GAME.nodes.length;
  if(State.idx >= total){
    State.done = true;
    saveState();
    Scanner.stop();
    showFinal();
    return;
  }

  const node = GAME.nodes[State.idx];

  root.innerHTML = `
    ${titleUI()}
    ${progressUI()}
    ${clueUI(node)}
    ${scanUI(node)}
    ${settingsUI()}
  `;

  Lep.mount("lepMain", "idle", true);

  document.getElementById("btnRepeatClue").onclick = () => {
    Lep.pulse("lepMain", "talk", 900);
  };

  document.getElementById("btnRescan").onclick = () => startScanningForNode(node);

  document.getElementById("btnReplayOpening").onclick = async () => {
    if(!AudioEngine.unlocked){
      toast("Press Start Hunt first.");
      return;
    }
    await AudioEngine.playVO(GAME.audio.opening);
  };

  document.getElementById("btnToggleSettings").onclick = () => {
    State.settingsOpen = !State.settingsOpen;
    render();
  };

  const saveBtn = document.getElementById("btnSaveTeam");
  if(saveBtn){
    saveBtn.onclick = () => {
      State.team = (document.getElementById("teamInput").value || "").trim();
      saveState();
      toast("Team saved.");
    };
  }

  root.querySelectorAll("[data-toggle]").forEach(btn => {
    btn.onclick = () => {
      const k = btn.getAttribute("data-toggle");
      State[k] = !State[k];
      AudioEngine.setToggles({
        music: State.musicEnabled,
        voice: State.voiceEnabled,
        sfx: State.sfxEnabled
      });
      render();
    };
  });

  startScanningForNode(node);
}

async function startScanningForNode(node){
  try{
    await Scanner.start(node.id, async () => {
      Lep.pulse("lepMain", "happy", 1100);

      FX.rainbow();
      FX.coinBurst(window.innerWidth * 0.5, window.innerHeight * 0.34, 150);
      FX.coinBurst(window.innerWidth * 0.25, window.innerHeight * 0.30, 90);
      FX.coinBurst(window.innerWidth * 0.75, window.innerHeight * 0.30, 90);

      if(navigator.vibrate){
        navigator.vibrate([110,60,150]);
      }

      AudioEngine.playSFX(GAME.audio.sfx.coinBurst);

      await Promise.all([
        playCorrectOnce(),
        showCelebration()
      ]);

      Scanner.stop();

      const wasFinal = !!node.isFinal || node.id === GAME.finalId;
      State.idx = State.idx + 1;
      saveState();

      if(wasFinal || State.idx >= GAME.nodes.length){
        State.done = true;
        saveState();

        showFinal();

        FX.rainbow();
        FX.rainbow();
        FX.coinBurst(window.innerWidth * 0.5, window.innerHeight * 0.32, 260);
        FX.coinBurst(window.innerWidth * 0.25, window.innerHeight * 0.24, 140);
        FX.coinBurst(window.innerWidth * 0.75, window.innerHeight * 0.24, 140);

        await AudioEngine.playVO(GAME.audio.finale);
        return;
      }

      render();
    });
  }catch(e){
    toast("Camera error: " + (e?.message || e));
  }
}

function wireFinalButtons(){
  const replay = document.getElementById("btnFinalSound");
  const done = document.getElementById("btnFinalDone");

  if(replay){
    replay.onclick = async () => {
      FX.rainbow();
      FX.coinBurst(window.innerWidth * 0.5, window.innerHeight * 0.32, 180);
      await AudioEngine.playVO(GAME.audio.finale);
    };
  }

  if(done){
    done.onclick = () => {
      localStorage.removeItem(KEY("idx"));
      localStorage.removeItem(KEY("done"));
      finalOverlay.classList.remove("show");
      State.idx = 0;
      State.done = false;
      saveState();
      location.reload();
    };
  }
}

function showFinal(){
  finalOverlay.classList.add("show");
  Lep.mount("finalLep", "happy", true);
  wireFinalButtons();
}

};

function escapeHTML(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function escapeAttr(s){
  return String(s).replaceAll('"',"&quot;");
}
